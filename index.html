<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Music</title> 
    <link rel="shortcut icon" type="image/jpg" href="./assets/image/iconimage.png"/>
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" 
          integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w==" 
          crossorigin="anonymous" />
    <link rel="preconnect" 
          href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" 
          rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="player ">
        <!-- Dashboard -->
        <div class="dashboard">
          <!-- Header -->
          <header>
            <h4>Now playing:</h4>
            <h2></h2>
          </header>
      
          <!-- CD -->
          <div class="cd">
            <div class="cd-thumb" style="">
            </div>
          </div>
      
          <!-- Control -->
          <div class="control">
            <div class="btn btn-repeat">
              <i class="fas fa-redo"></i>
            </div>
            <div class="btn btn-prev">
              <i class="fas fa-step-backward"></i>
            </div>
            <div class="btn btn-toggle-play">
              <i class="fas fa-pause icon-pause"></i>
              <i class="fas fa-play icon-play"></i>
            </div>
            <div class="btn btn-next">
              <i class="fas fa-step-forward"></i>
            </div>
            <div class="btn btn-random">
              <i class="fas fa-random"></i>
            </div>
          </div>
      
          <input id="progress" class="progress" type="range" value="0" step="1" min="0" max="100">
      
          <audio id="audio" src=""></audio>
        </div>
      
        <!-- Playlist -->
        <div class="playlist"></div>
  </div>    
  <script>


    // Các Bước Phải Làm:
    // 1. Render songs --> OK
    // 2. Scroll top  --> OK
    // 3. Play / Pause / seek --> OK
    // 4. CD Rotate  --> OK
    // 5. Next / Prev --> OK
    // 6. Random  --> OK
    // 7. Next / Repeat When endding --> OK
    // 8. Active Song --> OK
    // 9. Scroll active song into view --> skip
    // 10. Play song when click
  
  
  
    const $ = document.querySelector.bind(document);
    const $$ = document.querySelectorAll.bind(document);
  
    const heading = $("header h2");
    const cdThumb = $(".cd-thumb");
    const audio = $("#audio");
    const cd = $(".cd");
    const cdwidth = cd.offsetWidth;
    const statusplay = $(".player");
    const playBtn = $('.btn-toggle-play');
    const progress = $('#progress');
    const nextBtn = $('.btn-next');
    const prevBtn = $('.btn-prev');
    const randomBtn = $('.btn-random');
    const repeatBtn = $('.btn-repeat');
    const playlist = $('.playlist');

    const app = {
      currentIndex: 0,

      isPlaying: 0,

      isRandom: 0,

      isRepeat : 0,

      songs: [
        {
          name: 'Yêu Em CMNR',
          singer: 'Huyr & Rick',
          path: './assets/music/song1.mp3',
          image: './assets/image/image1.jpg'
        },
        {
          name: 'Độ Tộc 2',
          singer: 'Độ Mixi',
          path: './assets/music/song2.mp3',
          image: './assets/image/image2.jpg'
        },
        {
          name: '3107-3',
          singer: 'W/n Dương',
          path: './assets/music/song3.mp3',
          image: './assets/image/image3.jpg'
        },
        {
          name: 'Thích Em Hơi Nhiều',
          singer: 'Wean',
          path: './assets/music/song4.mp3',
          image: './assets/image/image4.jpg'
        },
        {
          name: 'Đường Tôi Trở Em Về',
          singer: 'BuiTruongLinh',
          path: './assets/music/song5.mp3',
          image: './assets/image/image5.jpg'
        },
        {
          name: 'Dù Cho Mai Về Sau',
          singer: 'BuiTruongLinh',
          path: './assets/music/song6.mp3',
          image: './assets/image/image6.jpg'
        },
        {
          name: 'Your Smile',
          singer: 'Obito & Ngân',
          path: './assets/music/song7.mp3',
          image: './assets/image/image7.jpg'
        },
        {
          name: 'Thức Giấc',
          singer: 'Dalab',
          path: './assets/music/song8.mp3',
          image: './assets/image/image8.jpg'
        },
        {
          name: 'Cưới Thoy',
          singer: 'Masiu',
          path: './assets/music/song9.mp3',
          image: './assets/image/image9.jpg'
        },
        {
          name: 'Stay',
          singer: 'Justin BB',
          path: './assets/music/song10.mp3',
          image: './assets/image/image10.jpg'
        }
      ],
    
      //Render songs
      render: function(){
        const htmls = this.songs.map((song,index) => {
          return  `
            <div class="song ${index === this.currentIndex ? 'active' : ''} " data-index="${index}" >
              <div class="thumb" 
                style="background-image: url('${song.image}')">
              </div>
              <div class="body">
                <h3 class="title">${song.name}</h3>
                <p class="author">${song.singer}</p>
              </div>
              <div class="option">
                <i class="fas fa-ellipsis-h"></i>
              </div>
            </div>
          `
         
        });
        $('.playlist').innerHTML = htmls.join('');
      },

      // Lắng nghe các sự kiện
      handleEvents: function(){
        
        // Đĩa nhạc quay khi nhạc chạy
        const cdThumbAnimate = cdThumb.animate([
          {transform: 'rotate(360deg)'}
        ],{
          duration: 10000,
          iterations: Infinity
        })
        cdThumbAnimate.pause();
        // Sự kiện cuộn lên cuộn xuống
        document.onscroll = function(){
          const scrolltop = window.scrollY || document.documentElement.scrollTop;
          const newWidth = cdwidth - scrolltop;

          cd.style.width  = newWidth > 0 ? newWidth +"px"  : 0;
          cd.style.opacity = newWidth / cdwidth;
        }

        // Sự kiện click play, pause
        playBtn.onclick = function(){
          if(app.isPlaying){
            audio.pause();
          }else{
            audio.play();
          }
          // Khi nhạc chạy
          audio.onplay = function(){
            app.isPlaying = 1;
            statusplay.classList.add('playing');
            cdThumbAnimate.play();
          }

          // Khi nhạc tắt
          audio.onpause =function(){
            app.isPlaying =0;
            statusplay.classList.remove('playing');
            cdThumbAnimate.pause();
          }

          // Khi tiến độ bài hát bị thay đổi
          audio.ontimeupdate = function(){
            if(audio.duration){
              const progressPersen = Math.floor(audio.currentTime/audio.duration *100);
              progress.value = progressPersen;
            }
          }

          // Xử lý khi tua song 
          progress.oninput = function(e){
              // từ số phần trăm của giây convert sang giây
              const seekTime = audio.duration / 100 * e.target.value; 
              audio.currentTime = seekTime;
              audio.play();
          }
        }

        // Khi next song
        nextBtn.onclick = function(){
          if(app.isRandom){
            app.playrandomSong();
          }else{
            app.nextSong();
          }
          audio.play();
          audio.onplay = function(){
            app.isPlaying = 1;
            statusplay.classList.add('playing');
            cdThumbAnimate.play();
          }
          app.render();
        }
        
        // Khi Prev Song
        prevBtn.onclick = function(){
          if(app.isRandom){
            app.playrandomSong();
          }else{
            app.prevSong();
          }
          audio.play();
          audio.onplay = function(){
            app.isPlaying = 1;
            statusplay.classList.add('playing');
            cdThumbAnimate.play();
          }
          app.render();
        }

        // Khi ấn random song
        randomBtn.onclick = function(){
          app.isRandom = !app.isRandom;
          randomBtn.classList.toggle('active',app.isRandom);
        }
        
        // Tự động chuyển khi hết bài hát
        audio.onended = function(){
          if(app.isRepeat){
            audio.play();
          }else{
            nextBtn.click();
          }
          
        }

        // Lặp lại bài hát
        repeatBtn.onclick = function(e){
          app.isRepeat = !app.isRepeat;
          repeatBtn.classList.toggle('active',app.isRepeat);
        }

        // Lắng nghe hành vi click vào bài hát
        playlist.onclick = function(e){
          const songNode = e.target.closest('.song:not(.active )');
          if(songNode || e.target.closest('.option')){
            if(songNode){
              app.currentIndex = Number(songNode.dataset.index);
              app.render();
              app.loadcurrentSong();
              audio.play();
              audio.onplay = function(){
              app.isPlaying = 1;
              statusplay.classList.add('playing');
              cdThumbAnimate.play();
          }
            }
          }
        }
      },
      // Định nghĩa các thuộc tính 
      defineProperties: function(){
        Object.defineProperty(this, "currentSong", {
          get: function(){
            return this.songs[this.currentIndex];
          }
        })
      },

      // Cho hiển thị bài hát đầu tiên là bài hát mặc định khi click vào web
      loadcurrentSong: function(){

        heading.textContent = this.currentSong.name;
        cdThumb.style.backgroundImage = `url('${this.currentSong.image}')`;
        audio.src = this.currentSong.path;
        
      },

      // Next song
      nextSong: function(){
        this.currentIndex +=1;
        if(this.currentIndex >= this.songs.length){
          this.currentIndex =0;
          this.currentSong =0;
        }
        this.loadcurrentSong();
      },

      // Prev song
      prevSong: function(){
        this.currentIndex -=1;
        if(this.currentIndex < 0){
          this.currentIndex = this.songs.length -1;
          this.currentSong = this.songs.length -1;
        }
        this.loadcurrentSong();
      },

      // Random song
      playrandomSong: function(){
        let newIndex;
        do{
          newIndex = Math.floor(Math.random() * app.songs.length);
        }while(newIndex === this.currentIndex)
        this.currentIndex = newIndex;
        this.loadcurrentSong();
      },


    
      start: function(){
        this.defineProperties();

        this.loadcurrentSong();
        
        this.handleEvents();

        this.render();
      }
    
    };
  
    app.start();
  </script> 
</body>
    
</html>
